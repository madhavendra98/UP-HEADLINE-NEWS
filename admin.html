<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UPHeadline Admin Panel</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>📰 UPHeadline Admin Panel</h1>
</header>

<div style="max-width:700px;margin:30px auto;padding:20px;background:#fff;border-radius:10px;box-shadow:0 0 10px #ccc;">

<input type="text" id="title" placeholder="News Title" style="width:100%;padding:10px;margin:10px 0;">

<textarea id="desc" placeholder="News Description" style="width:100%;padding:10px;height:120px;margin:10px 0;"></textarea>

<input type="text" id="image" placeholder="Image URL" style="width:100%;padding:10px;margin:10px 0;">

<select id="category" style="width:100%;padding:10px;margin:10px 0;">
<option value="UP News">UP News</option>
<option value="India">India</option>
<option value="World">World</option>
<option value="Sports">Sports</option>
<option value="Politics">Politics</option>
</select>

<button onclick="publishNews()" style="padding:12px 25px;background:#c00000;color:white;border:none;border-radius:5px;cursor:pointer;">
Publish News
</button>

</div>

<div id="newsList"></div>

<script type="module" src="admin.js"></script>

</body>
</html>
